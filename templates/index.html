<!DOCTYPE html>
<html>
<head>
    <title>Guess Game Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            width: 400px;
        }

        h2 {
            text-align: center;
        }

        #chatbox {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
            background: #1e293b;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #3b82f6;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #22c55e;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            border: none;
            border-radius: 5px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        .start-btn {
            width: 100%;
            margin-top: 10px;
            background: #f59e0b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 Guess the Number</h2>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter your guess..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <button class="start-btn" onclick="startGame()">Start Game</button>
</div>

<script>
function addMessage(message, sender) {
    let chatbox = document.getElementById("chatbox");

    let div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = message;

    chatbox.appendChild(div);

    // auto scroll
    chatbox.scrollTop = chatbox.scrollHeight;
}

async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value;

    if (!message) return;

    addMessage("You: " + message, "user");

    let response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
    });

    let data = await response.json();

    addMessage("Bot: " + data.reply, "bot");

    input.value = "";
}

function startGame() {
    fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: 'start'})
    })
    .then(res => res.json())
    .then(data => {
        addMessage("Bot: " + data.reply, "bot");
    });
}
</script>

</body>
</html>
